<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" role="img" aria-labelledby="title desc">
  <title id="title">Split behavior thumbnail</title>
  <desc id="desc">An agent emits refusal text while a separate action path still calls a restricted tool.</desc>
  <rect width="800" height="520" fill="#f6f7f8"/>
  <rect x="70" y="72" width="660" height="376" rx="18" fill="#ffffff" stroke="#d7dce2" stroke-width="4"/>

  <rect x="252" y="112" width="296" height="82" rx="14" fill="#eef2ff" stroke="#5366a5" stroke-width="4"/>
  <text x="400" y="164" fill="#364a85" font-family="Arial, sans-serif" font-size="32" font-weight="700" text-anchor="middle">LLM agent</text>

  <path d="M400 200 V254" fill="none" stroke="#24313d" stroke-width="8" stroke-linecap="round"/>
  <circle cx="400" cy="270" r="24" fill="#ffffff" stroke="#24313d" stroke-width="6"/>
  <path d="M380 286 C340 318 292 334 240 334" fill="none" stroke="#1f6f61" stroke-width="8" stroke-linecap="round"/>
  <path d="M420 286 C460 318 508 334 560 334" fill="none" stroke="#8a4f32" stroke-width="8" stroke-linecap="round"/>

  <rect x="105" y="324" width="270" height="88" rx="14" fill="#e9f3f0" stroke="#1f6f61" stroke-width="4"/>
  <text x="240" y="379" fill="#174f45" font-family="Arial, sans-serif" font-size="31" font-weight="700" text-anchor="middle">Refusal text</text>

  <rect x="425" y="324" width="270" height="88" rx="14" fill="#fbebe3" stroke="#8a4f32" stroke-width="4"/>
  <text x="560" y="379" fill="#733b22" font-family="Arial, sans-serif" font-size="31" font-weight="700" text-anchor="middle">Tool call</text>

  <path d="M360 238 C318 254 286 278 264 312" fill="none" stroke="#24313d" stroke-width="4" stroke-dasharray="10 12" stroke-linecap="round"/>
  <path d="M440 238 C482 254 514 278 536 312" fill="none" stroke="#24313d" stroke-width="4" stroke-dasharray="10 12" stroke-linecap="round"/>
</svg>
